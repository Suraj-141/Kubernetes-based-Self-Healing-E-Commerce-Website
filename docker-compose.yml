version: '3.8'

services:
  postgres-service:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres-service
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ecommerce
      - PORT=3001
      - JWT_SECRET=mysecretkey123
    depends_on:
      postgres-service:
        condition: service_healthy

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    environment:
      - DB_HOST=postgres-service
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ecommerce
      - PORT=3002
    depends_on:
      postgres-service:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    environment:
      - DB_HOST=postgres-service
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ecommerce
      - PORT=3003
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3004
    depends_on:
      postgres-service:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-service
      - order-service

volumes:
  postgres-data:
